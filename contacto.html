<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Haz tu Pedido - Milo's Pizza</title>

</head>

<body>
    <header>
        <img src="img/logo.jpg" alt="Logo" class="logo">
        <nav>
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="menu.html">Nuestro Menú</a></li>
                <li><a href="contacto.html">Haz tu Pedido</a></li>
                <li><a href="login.html">Acceder</a></li>
            </ul>
        </nav>
    </header>
<main class="form-container">
    <h2>Realiza tu Pedido Web</h2>
    <p>Completa tus datos y el servidor procesará tu orden en breve.</p>
    
    <form class="order-form" action="procesar_pedido.php" method="POST">
        <label for="nombre">Nombre Completo:</label>
        <input type="text" id="nombre" name="nombre" placeholder="Ej. Juan Pérez" required>
        
        <label for="pizza">Selecciona tu Pizza:</label>
        <select id="pizza" name="pizza">
            <option value="Pepperoni Clásica">Pepperoni Clásica - $189.00</option>
            <option value="Mexicana Especial">Mexicana Especial - $210.00</option>
            <option value="Hawaiana Real">Hawaiana Real - $195.00</option>
        </select>

        <label for="cantidad">Cantidad:</label>
        <input type="number" id="cantidad" name="cantidad" value="1" min="1" max="10" required>
        
        <label for="direccion">Dirección de Entrega:</label>
        <textarea id="direccion" name="direccion" placeholder="Calle, número y colonia..." required></textarea>
        
        <button type="submit" class="btn">Confirmar y Enviar Pedido</button>
    </form>
</main>
